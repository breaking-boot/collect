name: Update courses JSON from API

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

  permissions:
    contents: write

  jobs:
    update-courses:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Download latest course data
          run: |
            curl -L "https://api.boot.dev/v1/static/courses/overview" -o out.json

        - name: Commit updated JSON
          run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            git add out.json

            if git diff --cached --quiet; then
              echo "No changes."
            else
              git commit -m "Update course data"
              git push
            fi
