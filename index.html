<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Courses Table</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.css"
    rel="stylesheet"
  />
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-4">Courses</h1>

    <table id="coursesTable" class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>UUID</th>
          <th>Title</th>
          <th>Enrolled Students</th>
          <th>Rating</th>
          <th>Completion XP</th>
        </tr>
      </thead>
      <tbody></tbody>
      <tfoot>
        <tr>
          <th></th>
          <th>Average</th>
          <th id="avg-enrolled"></th>
          <th id="avg-rating"></th>
          <th id="avg-xp"></th>
        </tr>
        <tr>
          <th></th>
          <th>Sum</th>
          <th></th>
          <th></th>
          <th id="sum-xp"></th>
        </tr>
      </tfoot>
    </table>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.js"></script>

  <script>
  async function loadCourses() {
      const response = await fetch("./out.json", {cache: "no-store"});
      const courses = await response.json();
  
      const tbody = document.querySelector("#coursesTable tbody");
  
      for (const course of courses) {
          const row = document.createElement("tr");
  
          row.innerHTML = `
              <td>${course.UUID}</td>
              <td>${course.Title}</td>
              <td>${course.NumEnrolled?.toLocaleString()}</td>
              <td>${course.Rating?.Average?.toFixed(2) ?? ""}</td>
              <td>${course.CompletionXP?.toLocaleString()}</td>
          `;
  
          tbody.appendChild(row);
      }
  
      new DataTable("#coursesTable", {
          pageLength: 25,
          order: [[1, "asc"]],
      
          footerCallback: function () {
              const api = this.api();
      
              const parseNumber = value => {
                  if (typeof value === "number") return value;
                  return Number(String(value).replace(/,/g, "")) || 0;
              };
      
              const visibleColumnData = columnIndex =>
                  api
                      .column(columnIndex, { search: "applied" })
                      .data()
                      .toArray()
                      .map(parseNumber);
      
              const average = values => {
                  if (values.length === 0) return 0;
                  return values.reduce((sum, value) => sum + value, 0) / values.length;
              };
      
              const sum = values =>
                  values.reduce((sum, value) => sum + value, 0);
      
              const enrolled = visibleColumnData(2);
              const ratings = visibleColumnData(3);
              const xp = visibleColumnData(4);
      
              document.querySelector("#avg-enrolled").textContent =
                  Math.round(average(enrolled)).toLocaleString();
      
              document.querySelector("#avg-rating").textContent =
                  average(ratings).toFixed(2);
      
              document.querySelector("#avg-xp").textContent =
                  Math.round(average(xp)).toLocaleString();
      
              document.querySelector("#sum-xp").textContent =
                  sum(xp).toLocaleString();
          }
      });
  }
  
  loadCourses();
  </script>
</body>
</html>
